<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游智能助手</title>
    <!-- 引入Tailwind CSS和Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
<div class="w-full max-w-4xl chat-container">
    <!-- 头部 -->
    <div class="bg-gradient-to-r from-purple-500 to-pink-500 text-white p-6 rounded-t-2xl">
        <div class="flex items-center space-x-3">
            <i class="fas fa-robot text-2xl"></i>
            <div>
                <h1 class="text-2xl font-bold">旅游智能助手</h1>
                <p class="text-purple-200">基于豆包AI的智能对话服务</p>
            </div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="h-96 overflow-y-auto p-4 space-y-4" id="chatMessages">
        <div class="flex justify-start">
            <div class="message-bubble bg-gray-100 text-gray-800 p-3 rounded-lg">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-robot text-blue-500"></i>
                    <span class="font-semibold">AI助手</span>
                </div>
                <p class="mt-2">您好！我是您的旅游智能助手，可以为您提供旅游建议、景点推荐、行程规划等服务。请问有什么可以帮助您的吗？</p>
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="border-t p-4">
        <div class="flex space-x-2">
            <input type="text"
                   id="userInput"
                   placeholder="输入您的问题，例如：'推荐北京三日游路线'..."
                   class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()"
                    class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-6 py-2 rounded-lg hover:from-purple-600 hover:to-pink-600 transition-colors">
                <i class="fas fa-paper-plane"></i> 发送
            </button>
        </div>
    </div>
</div>

<script>
    function sendMessage() {
        const userInput = document.getElementById('userInput').value;
        if (!userInput.trim()) return;

        // 添加用户消息
        addMessage(userInput, 'user');

        // 清空输入框
        document.getElementById('userInput').value = '';

        // 显示加载状态
        showTypingIndicator();

        // 调用后端API
        fetch('http://localhost:8080/ai/chat', {
            method: 'POST',
            body: JSON.stringify(userInput),
            headers: {
                'Content-Type': 'application/json',
            }
        })
            .then(response => response.text())
            .then(aiResponse => {
                removeTypingIndicator();
                addMessage(aiResponse, 'ai');
            })
            .catch(error => {
                removeTypingIndicator();
                addMessage('网络请求失败，请重试', 'ai');
                console.error('Error:', error);
            });
    }

    function addMessage(message, type) {
        const messagesDiv = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'}`;

        const bubbleClass = type === 'user'
            ? 'message-bubble bg-gradient-to-r from-purple-500 to-pink-500 text-white p-3 rounded-lg'
            : 'message-bubble bg-gray-100 text-gray-800 p-3 rounded-lg';

        const icon = type === 'user'
            ? '<i class="fas fa-user text-white"></i>'
            : '<i class="fas fa-robot text-blue-500"></i>';

        const name = type === 'user' ? '您' : 'AI助手';

        messageDiv.innerHTML = `
                <div class="${bubbleClass}">
                    <div class="flex items-center space-x-2 mb-2">
                        ${icon}
                        <span class="font-semibold">${name}</span>
                    </div>
                    <p>${message}</p>
                </div>
            `;

        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingIndicator() {
        const messagesDiv = document.getElementById('chatMessages');
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typingIndicator';
        typingDiv.className = 'flex justify-start';
        typingDiv.innerHTML = `
                <div class="message-bubble bg-gray-100 text-gray-800 p-3 rounded-lg">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-robot text-blue-500"></i>
                        <span class="font-semibold">AI助手</span>
                    </div>
                    <div class="flex items-center space-x-1 mt-2">
                        <div class="typing-indicator"></div>
                        <span class="text-sm text-gray-500">正在思考...</span>
                    </div>
                </div>
            `;
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTypingIndicator() {
        const typingIndicator = document.getElementById('typingIndicator');
        if (typingIndicator) {
            typingIndicator.remove();
        }
    }
</script>
</body>
</html>
